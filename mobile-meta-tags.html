<!-- Mobile Optimization Meta Tags - Add to <head> -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#007bff">

<!-- Preconnect to speed up external resources -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://www.googletagmanager.com">

<!-- DNS Prefetch for faster lookups -->
<link rel="dns-prefetch" href="https://www.google-analytics.com">

<!-- Touch icons for mobile bookmarks -->
<link rel="apple-touch-icon" sizes="180x180" href="/images/asset104.png">
<link rel="icon" type="image/png" sizes="32x32" href="/images/asset104.png">
<link rel="icon" type="image/png" sizes="16x16" href="/images/asset104.png">
